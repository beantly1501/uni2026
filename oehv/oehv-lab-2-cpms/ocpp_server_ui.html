<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OCPP Server UI</title>
  <style>
    :root {
      --blue: #004f9f;
      --blue-dark: #06355f;
      --bg: #eef3f8;
      --panel: #fff;
      --line: #d7e1eb;
      --text: #12263a;
      --muted: #657789;
      --ok: #21883f;
      --bad: #c73636;
      --warn: #f3c33c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, sans-serif;
    }
    main {
      width: min(1280px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 22px 0;
    }
    header {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 18px;
      align-items: center;
      background: linear-gradient(135deg, var(--blue), var(--blue-dark));
      color: white;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 10px 28px rgba(0, 79, 159, 0.22);
    }
    h1, h2 { margin: 0; letter-spacing: 0; }
    h1 { font-size: clamp(26px, 4vw, 40px); }
    h2 { font-size: 18px; color: var(--blue-dark); margin-bottom: 12px; }
    .fer-logo {
      display: block;
      width: 118px;
      max-width: 28vw;
      height: auto;
    }
    .fer-project {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      margin-bottom: 8px;
      padding: 4px 9px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.14);
      color: #ffffff;
      font-size: 12px;
      font-weight: 750;
      text-transform: uppercase;
    }
    header p {
      margin: 5px 0 0;
      color: #d9ecff;
      font-size: 15px;
    }
    @media (max-width: 620px) {
      header { grid-template-columns: 1fr; }
      .fer-logo {
        width: 96px;
        max-width: 46vw;
      }
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
      gap: 16px;
    }
    @media (max-width: 880px) { .grid { grid-template-columns: 1fr; } }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 8px 22px rgba(7, 45, 84, 0.08);
    }
    label {
      display: block;
      margin: 10px 0 5px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }
    input, select {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: #f7fafd;
      color: var(--text);
      font-size: 14px;
    }
    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    button {
      min-height: 42px;
      border: 0;
      border-radius: 8px;
      background: var(--blue);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    button.stop { background: var(--bad); }
    .sessions {
      display: grid;
      gap: 12px;
    }
    .session {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfdff;
    }
    .session-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 6px;
      padding: 3px 8px;
      background: rgba(33, 136, 63, 0.12);
      color: #176831;
      font-size: 12px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-top: 8px;
    }
    th, td {
      text-align: left;
      border-bottom: 1px solid var(--line);
      padding: 6px;
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 700; }
    .empty {
      color: var(--muted);
      font-style: italic;
    }
    #logs {
      height: 420px;
      margin: 0;
      padding: 12px;
      overflow-y: auto;
      border-radius: 8px;
      background: #061a2f;
      color: #8de6ff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      list-style: none;
    }
    #logs li {
      padding: 4px 0;
      border-bottom: 1px solid rgba(141, 230, 255, 0.12);
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <img class="fer-logo" src="/fer_white_logo.png" alt="FER">
      <div>
        <div class="fer-project">Zavod za visoki napon i energetiku</div>
        <h1>Charge Point Management System (CPMS)</h1>
        <p>Fakultet elektrotehnike i računarstva, Sveučilište u Zagrebu</p>
      </div>
    </header>
    <div class="grid">
      <div>
        <section>
          <h2>Remote Commands</h2>
          <label for="chargerId">Charger</label>
          <select id="chargerId"></select>
          <label for="connectorId">Connector ID</label>
          <input id="connectorId" type="number" min="1" value="1">
          <label for="idTag">Tag ID</label>
          <input id="idTag" type="text" value="TAG-&lt;JMBAG&gt;">
          <label for="transactionId">Transaction ID for Stop</label>
          <select id="transactionId"></select>
          <div class="buttons">
            <button id="remoteStart">Remote Start</button>
            <button id="remoteStop" class="stop">Remote Stop</button>
          </div>
        </section>
        <section>
          <h2>Logs</h2>
          <ul id="logs"></ul>
        </section>
      </div>
      <section>
        <h2>Active Sessions</h2>
        <div id="sessions" class="sessions"></div>
      </section>
    </div>
  </main>
  <script>
    let state = {chargers: [], logs: [], authorizedTags: []};
    const $ = (id) => document.getElementById(id);

    async function api(path, payload = null) {
      const options = payload === null ? {} : {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload)
      };
      const response = await fetch(path, options);
      if (!response.ok) throw new Error(await response.text());
      return response.json();
    }

    function selectedCharger() {
      return $("chargerId").value;
    }

    function selectedTransaction() {
      const raw = $("transactionId").value;
      return raw ? Number(raw) : null;
    }

    async function refresh() {
      state = await api("/api/state");
      renderControls();
      renderSessions();
      renderLogs();
    }

    function renderControls() {
      const current = $("chargerId").value;
      $("chargerId").innerHTML = "";
      for (const charger of state.chargers) {
        const option = document.createElement("option");
        option.value = charger.chargerId;
        option.textContent = charger.chargerId;
        $("chargerId").appendChild(option);
      }
      if (state.chargers.some((charger) => charger.chargerId === current)) {
        $("chargerId").value = current;
      }

      const charger = state.chargers.find((item) => item.chargerId === $("chargerId").value);
      const txCurrent = $("transactionId").value;
      $("transactionId").innerHTML = "";
      const auto = document.createElement("option");
      auto.value = "";
      auto.textContent = "latest active transaction";
      $("transactionId").appendChild(auto);
      for (const transaction of (charger ? charger.transactions : [])) {
        const option = document.createElement("option");
        option.value = transaction.transactionId;
        option.textContent = `${transaction.transactionId} / connector ${transaction.connectorId || "-"}`;
        $("transactionId").appendChild(option);
      }
      if ([...$("transactionId").options].some((option) => option.value === txCurrent)) {
        $("transactionId").value = txCurrent;
      }
    }

    function renderSessions() {
      if (!state.chargers.length) {
        $("sessions").innerHTML = '<div class="empty">No connected chargers.</div>';
        return;
      }
      $("sessions").innerHTML = state.chargers.map((charger) => {
        const txRows = charger.transactions.length ? charger.transactions.map((tx) => `
          <tr><td>${tx.transactionId}</td><td>${tx.connectorId || "-"}</td><td>${tx.idTag || "-"}</td><td>${tx.startedAt || "-"}</td></tr>
        `).join("") : '<tr><td colspan="4" class="empty">No active transactions</td></tr>';
        const meters = Object.entries(charger.lastMeterValues || {});
        const meterRows = meters.length ? meters.map(([connector, meter]) => `
          <tr><td>${connector}</td><td>${meter.timestamp || "-"}</td><td>${meter.transactionId || "-"}</td><td>${formatSampled(meter.sampledValue || {})}</td></tr>
        `).join("") : '<tr><td colspan="4" class="empty">No meter values yet</td></tr>';
        const statuses = Object.entries(charger.connectorStatuses || {});
        const statusText = statuses.length
          ? statuses.map(([connector, data]) => `Connector ${connector}: ${data.status}`).join("<br>")
          : '<span class="empty">No statuses yet</span>';
        const remoteAuths = charger.remoteStartAuthorizations || [];
        const remoteAuthText = remoteAuths.length
          ? remoteAuths.map((auth) => `Connector ${auth.connectorId}: ${auth.idTag} (${auth.used ? "used" : "pending"})`).join("<br>")
          : '<span class="empty">No remote-start tags</span>';
        return `
          <div class="session">
            <div class="session-title">
              <span>${charger.chargerId}</span>
              <span class="pill">connected</span>
            </div>
            <div>Connected: ${charger.connectedAt}</div>
            <div>Last seen: ${charger.lastSeen}</div>
            <div>${statusText}</div>
            <div>${remoteAuthText}</div>
            <table>
              <thead><tr><th>Tx</th><th>Connector</th><th>Tag</th><th>Started</th></tr></thead>
              <tbody>${txRows}</tbody>
            </table>
            <table>
              <thead><tr><th>Connector</th><th>Timestamp</th><th>Tx</th><th>Last Meter Values</th></tr></thead>
              <tbody>${meterRows}</tbody>
            </table>
          </div>
        `;
      }).join("");
    }

    function formatSampled(sampled) {
      const entries = Object.entries(sampled);
      if (!entries.length) return "-";
      return entries.map(([key, value]) => `${key}: ${value}`).join("<br>");
    }

    function renderLogs() {
      $("logs").innerHTML = state.logs.map((line) => `<li>${escapeHtml(line)}</li>`).join("");
      $("logs").scrollTop = $("logs").scrollHeight;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[char]));
    }

    $("remoteStart").addEventListener("click", async () => {
      await api("/api/remote-start", {
        chargerId: selectedCharger(),
        connectorId: Number($("connectorId").value || 1),
        idTag: $("idTag").value
      });
      await refresh();
    });

    $("remoteStop").addEventListener("click", async () => {
      await api("/api/remote-stop", {
        chargerId: selectedCharger(),
        transactionId: selectedTransaction()
      });
      await refresh();
    });

    $("chargerId").addEventListener("change", renderControls);
    refresh();
    setInterval(refresh, 1000);
  </script>
</body>
</html>
